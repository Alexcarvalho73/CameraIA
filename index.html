<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visão IA - Monitoramento de Frigorífico</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --danger: #ef4444;
            --success: #10b981;
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, hsla(210,100%,10%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(200,100%,15%,1) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            height: 100vh;
            gap: 20px;
            padding: 20px;
        }

        /* Sidebar Left */
        .sidebar-left {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .menu-item.active {
            background: rgba(79, 172, 254, 0.1);
            color: var(--primary);
            border-left: 4px solid var(--primary);
        }

        /* Main Content */
        .main-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin: 10px 0;
        }

        .camera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .camera-container {
            position: relative;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.05);
            aspect-ratio: 16/9;
        }

        .camera-feed {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
        }

        .record-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
        }

        .record-btn:hover {
            background: var(--danger);
            transform: scale(1.05);
        }

        .record-btn.recording {
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        /* Sidebar Right */
        .sidebar-right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .alerts-panel {
            flex: 1;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 40px);
            overflow: hidden;
        }

        #alerts-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar */
        #alerts-list::-webkit-scrollbar {
            width: 6px;
        }
        #alerts-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        #alerts-list::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 10px;
        }

        .alert-item {
            padding: 15px;
            background: rgba(239, 68, 68, 0.1);
            border-left: 4px solid var(--danger);
            border-radius: 8px;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .alert-time {
            font-size: 12px;
            opacity: 0.6;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-content img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 0 30px var(--primary);
        }

        .close-modal {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .dashboard {
                grid-template-columns: 1fr;
                height: auto;
            }
            .sidebar-left, .sidebar-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar-left">
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                </svg>
                Visão IA
            </div>
            
            <nav>
                <div class="menu-item active">Dashboard</div>
                <div class="menu-item">Relatórios</div>
                <div class="menu-item">Configurações</div>
                <div class="menu-item">Usuários</div>
            </nav>

            <div style="margin-top: auto; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px;">
                <p style="font-size: 12px; opacity: 0.5;">Câmera Ativa</p>
                <select id="camera-selector" onchange="switchCamera(this.value)" style="width: 100%; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 5px; padding: 5px; margin-top: 5px; cursor: pointer;">
                    <option value="all">Visão Geral (Grade)</option>
                    <option value="camera_01">Câmera 01 - Ruptura</option>
                    <option value="camera_02">Câmera 02 - Comportamento</option>
                </select>
            </div>
        </aside>

        <main class="main-view">
            <div class="header-stats">
                <div class="stat-card">
                    <p style="opacity: 0.6; font-size: 14px;">Total de Ocorrências</p>
                    <div class="stat-value" id="total-alerts">12</div>
                    <p style="color: var(--danger); font-size: 12px;">↑ 12% desde ontem</p>
                </div>
                <div class="stat-card">
                    <p style="opacity: 0.6; font-size: 14px;">Eficiência da Linha</p>
                    <div class="stat-value">98.4%</div>
                    <p style="color: var(--success); font-size: 12px;">Estável</p>
                </div>
                <div class="stat-card">
                    <p style="opacity: 0.6; font-size: 14px;">Uptime Sistema</p>
                    <div class="stat-value">24h 12m</div>
                    <p style="opacity: 0.4; font-size: 12px;">Sem interrupções</p>
                </div>
            </div>

            <div id="main-view" style="display: none;">
                <div class="camera-container" style="max-height: 70vh;">
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        <span id="main-cam-title">CAM 01</span>
                    </div>
                    <img id="main-cam-feed" src="" class="camera-feed" alt="Main Feed">
                </div>
            </div>

            <div id="grid-view" class="camera-grid">
                <div class="camera-container">
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        CAM 01 - RUPTURA
                    </div>
                    <img src="/video_feed/camera_01" class="camera-feed" alt="Video Feed 1">
                    <button id="btn-record-camera_01" class="record-btn" onclick="toggleRecord('camera_01')">
                        <div style="width: 8px; height: 8px; background: white; border-radius: 50%;"></div>
                        Gravar
                    </button>
                </div>
                <div class="camera-container">
                    <div class="status-badge">
                        <div class="status-dot" style="background: var(--secondary); box-shadow: 0 0 10px var(--secondary);"></div>
                        CAM 02 - COMPORTAMENTO
                    </div>
                    <img src="/video_feed/camera_02" class="camera-feed" alt="Video Feed 2">
                    <button id="btn-record-camera_02" class="record-btn" onclick="toggleRecord('camera_02')">
                        <div style="width: 8px; height: 8px; background: white; border-radius: 50%;"></div>
                        Gravar
                    </button>
                </div>
            </div>
        </main>

        <aside class="sidebar-right">
            <div class="alerts-panel">
                <h3 style="margin-bottom: 20px;">Alertas Recentes</h3>
                <div id="alerts-list">
                    <!-- Alerts will be loaded here dynamically -->
                </div>
            </div>
        </aside>
    </div>

    <!-- Modal for Alert Images -->
    <div id="alertModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modalImg" src="" alt="Alerta">
            <p id="modalInfo" style="margin-top: 15px; text-align: center; font-weight: 600;"></p>
        </div>
    </div>

    <script>
        let lastAlertCount = -1;

        function switchCamera(camId) {
            const grid = document.getElementById('grid-view');
            const main = document.getElementById('main-view');
            const mainFeed = document.getElementById('main-cam-feed');
            const mainTitle = document.getElementById('main-cam-title');

            if (camId === 'all') {
                grid.style.display = 'grid';
                main.style.display = 'none';
                mainFeed.src = '';
            } else {
                grid.style.display = 'none';
                main.style.display = 'block';
                mainFeed.src = `/video_feed/${camId}`;
                mainTitle.innerText = camId === 'camera_01' ? 'CAM 01 - RUPTURA' : 'CAM 02 - COMPORTAMENTO';
            }
        }

        let isRecording = { "camera_01": false, "camera_02": false };

        async function toggleRecord(camId) {
            const btn = document.getElementById(`btn-record-${camId}`);
            if (!isRecording[camId]) {
                const res = await fetch(`/start_record/${camId}`);
                const data = await res.json();
                if (data.status === 'success') {
                    isRecording[camId] = true;
                    btn.classList.add('recording');
                    btn.innerHTML = 'Parar Gravação';
                }
            } else {
                const res = await fetch(`/stop_record/${camId}`);
                const data = await res.json();
                if (data.status === 'success') {
                    isRecording[camId] = false;
                    btn.classList.remove('recording');
                    btn.innerHTML = '<div style="width: 8px; height: 8px; background: white; border-radius: 50%;"></div> Gravar';
                }
            }
        }

        async function fetchAlerts() {
            try {
                const response = await fetch('/alerts');
                const alerts = await response.json();
                
                const list = document.getElementById('alerts-list');
                const totalBadge = document.getElementById('total-alerts');
                
                totalBadge.innerText = alerts.length;
                
                // Only update if count changed
                if (alerts.length !== lastAlertCount) {
                    list.innerHTML = '';
                    alerts.forEach(alert => {
                        const div = document.createElement('div');
                        div.className = 'alert-item';
                        div.style.cursor = 'pointer';
                        div.onclick = () => openModal(alert.image_url, `${alert.date} ${alert.time} - ${alert.message}`);
                        div.innerHTML = `
                            <p class="alert-time">${alert.date || 'Hoje'} ${alert.time || ''}</p>
                            <p style="font-size: 11px; font-weight: bold; color: var(--secondary); margin-bottom: 5px;">${alert.camera || 'Câmera Desconhecida'}</p>
                            <p>${alert.message}</p>
                        `;
                        list.appendChild(div);
                    });
                    lastAlertCount = alerts.length;
                }
            } catch (e) {
                console.error("Error fetching alerts:", e);
            }
        }

        function openModal(imgUrl, info) {
            document.getElementById('modalImg').src = imgUrl;
            document.getElementById('modalInfo').innerText = info;
            document.getElementById('alertModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('alertModal').style.display = 'none';
        }

        // Fetch alerts every 2 seconds
        setInterval(fetchAlerts, 2000);
        fetchAlerts();

        console.log("Dashboard IA carregado com monitoramento de alertas.");
    </script>
</body>
</html>
